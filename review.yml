  - date: '2026-06-03'
    rating: 1
    summary: >-
      King Abdulaziz University (QS World 2025 #149) has no openly documented,
      self-service developer API, API reference, or developer portal that could be
      verified. The official website (kau.edu.sa) resolves and confirms institutional
      identity; its "Open Data" page is a beta placeholder with no datasets, endpoints,
      or downloads. KAU runs gated identity infrastructure (sso.kau.edu.sa and an Oracle
      Access Manager federation endpoint at iam.kau.edu.sa) and library/scientific
      platforms, but none expose public, documented APIs. No official KAU GitHub
      organization exists (only a student Google Developer Student Club and individual
      projects). Library and scientific-platform hosts could not be fetched live from
      this environment (connection refused / 403 / timeout) and search results were used
      to confirm their existence; no endpoints were fabricated. The single cataloged
      "API" reflects the gated SSO/identity infrastructure honestly rather than any
      open programmatic interface.
